<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <p>Nike Shoe Price Website</p>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>

                {% for i in range(product_dict.title|length) %}
                    <tr>
                        <td> {{ product_dict.title[i] }} </td>
                        <td> {{ product_dict.price[i] }} </td>
                    </tr>
                {% endfor %}
        </tbody>
    </table>
</body>
</html>
